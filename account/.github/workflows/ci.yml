name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run unit tests only
      run: |
        cd account
        ./gradlew test --tests="*Test" -DDB_URL=jdbc:h2:mem:testdb -DDB_USER=sa -DDB_PASSWORD= --no-daemon
      env:
        DB_URL: jdbc:h2:mem:testdb
        DB_USER: sa
        DB_PASSWORD: ""

    - name: Generate test report
      if: failure()
      run: |
        cd account
        ./gradlew test --tests="*Test" --continue --info | grep -E "(FAILED|SUCCESS)" || true

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: account/build/reports/tests/

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: modubank_test
          POSTGRES_USER: modubank
          POSTGRES_PASSWORD: modubank
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Wait for PostgreSQL
      run: |
        echo "Waiting for PostgreSQL to be ready..."
        for i in {1..30}; do
          if pg_isready -h localhost -p 5432 -U modubank; then
            echo "PostgreSQL is ready!"
            break
          fi
          echo "Attempt $i/30: PostgreSQL not ready, waiting..."
          sleep 2
        done

    - name: Run integration tests
      run: |
        cd account
        ./gradlew test --tests="*IT" -DDB_URL=jdbc:postgresql://localhost:5432/modubank_test -DDB_USER=modubank -DDB_PASSWORD=modubank --no-daemon
      env:
        DB_URL: jdbc:postgresql://localhost:5432/modubank_test
        DB_USER: modubank
        DB_PASSWORD: modubank

    - name: Generate integration test report
      if: failure()
      run: |
        cd account
        ./gradlew test --tests="*IT" --continue --info | grep -E "(FAILED|SUCCESS)" || true

    - name: Upload integration test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-reports
        path: account/build/reports/tests/

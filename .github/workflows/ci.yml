name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: modubank_test
          POSTGRES_USER: modubank
          POSTGRES_PASSWORD: modubank
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x account/gradlew

      - name: Build with Gradle
        run: cd account && ./gradlew build -x test --no-daemon

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U modubank -q; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL not ready after 60 seconds"
          exit 1

      - name: Run tests
        run: cd account && ./gradlew test -DDB_URL=jdbc:postgresql://localhost:5432/modubank_test -DDB_USER=modubank -DDB_PASSWORD=modubank --no-daemon

      - name: Run ktlint
        run: cd account && ./gradlew ktlintCheck --no-daemon

      - name: Run ktlint format
        run: cd account && ./gradlew ktlintFormat --no-daemon

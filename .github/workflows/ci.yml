name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: modubank_test
          POSTGRES_USER: modubank
          POSTGRES_PASSWORD: modubank
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x account/gradlew

      - name: Build with Gradle
        run: cd account && ./gradlew build -x test --no-daemon

      - name: Wait for PostgreSQL to be ready
        uses: nick Fields/retry@v4
        with:
          timeout_seconds: 60
          max_attempts: 10
          command: PGPASSWORD=modubank pg_isready -h localhost -p 5432 -U modubank

      - name: Run tests
        run: cd account && ./gradlew test -DDB_URL=jdbc:postgresql://localhost:5432/modubank_test -DDB_USER=modubank -DDB_PASSWORD=modubank --no-daemon

      - name: Run ktlint
        run: cd account && ./gradlew ktlintCheck --no-daemon

      - name: Run ktlint format
        run: cd account && ./gradlew ktlintFormat --no-daemon

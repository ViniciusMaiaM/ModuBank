name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x account/gradlew

      - name: Build with Gradle
        run: cd account && ./gradlew build -x test --no-daemon

      - name: Run tests
        run: cd account && ./gradlew test --no-daemon

      - name: Run ktlint
        run: cd account && ./gradlew ktlintCheck --no-daemon

      - name: Run ktlint format
        run: cd account && ./gradlew ktlintFormat --no-daemon
